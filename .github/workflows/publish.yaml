name: "Build and Publish OpenRuntimes Images"
run-name: "Build and Publish OpenRuntimes Images (${{ github.sha }} by @${{ github.actor }})"

on:
  workflow_dispatch:
    inputs:
      runtime:
        description: "Bake group or target to build, e.g. 'node' or 'node-21_0' (leave empty for all)"
        required: false
        default: ""
        type: string
  release:
    types: [ published ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
      is_rc: ${{ steps.check.outputs.is_rc }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Check docker-bake.json is up to date
        run: bun ./ci/bake.ts --check
      - name: Check if RC build
        id: check
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
          fi
      - name: Resolve bake targets
        id: matrix
        run: |
          GROUP="${{ inputs.runtime }}"
          echo "targets=$(docker buildx bake --print ${GROUP:-default} | jq -c '[.target | keys[]]')" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    if: needs.prepare.outputs.is_rc != 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME  }}
          password: ${{ secrets.DOCKERHUB_TOKEN  }}
      - name: Build & Publish to DockerHub
        run: SHA_SUFFIX="-${GITHUB_SHA::12}" docker buildx bake --push "${{ matrix.target }}"

  deploy-rc:
    needs: prepare
    if: needs.prepare.outputs.is_rc == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
    name: ${{ matrix.target }}-rc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME  }}
          password: ${{ secrets.DOCKERHUB_TOKEN  }}
      - name: Build & Publish to DockerHub
        run: docker buildx bake --push "${{ matrix.target }}"
        env:
          TAG_SUFFIX: "-rc"

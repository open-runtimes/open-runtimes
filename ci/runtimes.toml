    "21.0-mjs",
    "20.0-mjs",
    "19.0-mjs",
    "18.0-mjs",
    "16.0-mjs",
]
commands = { install = "npm install", start = "bash helpers/server.sh" }
formatter = { prepare = "npm i -g @biomejs/biome", check = "biome format .", write = "biome format --write ." }
